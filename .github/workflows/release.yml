name: Build and Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          
      - name: 赋予 gradlew 执行权限
        run: chmod +x gradlew

      - name: Build
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          ./gradlew --no-daemon -Dorg.gradle.java.home="${JAVA_HOME}" -Pmod_version="${VERSION}" build

      - name: Build Resource Pack
        run: |
          set -euo pipefail
          PACK_ROOT="resourcepack/command_alias_lang_pack"
          ASSETS_DIR="$PACK_ROOT/assets/command_alias/lang"
          DIST_DIR="dist/release-assets"
          mkdir -p "$DIST_DIR"
          mkdir -p "$ASSETS_DIR"
          cp -f src/main/resources/assets/command_alias/lang/zh_cn.json "$ASSETS_DIR/zh_cn.json"
          cp -f src/main/resources/assets/command_alias/lang/en_us.json "$ASSETS_DIR/en_us.json"
          cat > "$PACK_ROOT/pack.mcmeta" <<'EOF'
          {
            "pack": {
              "pack_format": 34,
              "description": "Command Alias i18n (zh_cn + en_us)"
            }
          }
          EOF
          rm -f "$DIST_DIR/command_alias_lang_pack.zip"
          (cd "$PACK_ROOT" && zip -r "../../$DIST_DIR/command_alias_lang_pack.zip" .)
          sha1sum "$DIST_DIR/command_alias_lang_pack.zip" | awk '{print $1}' > "$DIST_DIR/command_alias_lang_pack.zip.sha1"
          cp -f build/libs/*.jar "$DIST_DIR/"

      - name: Check GPG secrets
        id: gpg_check
        shell: pwsh
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          $enabled = -not [string]::IsNullOrWhiteSpace($env:GPG_PRIVATE_KEY) -and -not [string]::IsNullOrWhiteSpace($env:GPG_PASSPHRASE)
          if ($enabled) {
            "enabled=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            Write-Host "GPG signing enabled."
          } else {
            "enabled=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            Write-Host "GPG signing skipped: missing secrets."
          }

      - name: Import GPG private key
        id: gpg
        if: steps.gpg_check.outputs.enabled == 'true'
        shell: pwsh
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          $keyFile = Join-Path $env:RUNNER_TEMP "acb-signing.key.asc"
          Set-Content -Path $keyFile -Value $env:GPG_PRIVATE_KEY -Encoding utf8
          gpg --batch --import $keyFile
          $fpr = (gpg --batch --list-secret-keys --with-colons | Select-String '^fpr:' | Select-Object -First 1).ToString().Split(':')[9]
          if (-not $fpr) { throw "No GPG secret key fingerprint found after import." }
          "fingerprint=$fpr" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Imported GPG key fingerprint: $fpr"

      - name: Sign release assets with GPG
        if: steps.gpg.outputs.fingerprint != ''
        shell: pwsh
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          GPG_FPR: ${{ steps.gpg.outputs.fingerprint }}
        run: |
          Get-ChildItem "dist/release-assets" -File | ForEach-Object {
            $asc = "$($_.FullName).asc"
            if (Test-Path $asc) { Remove-Item $asc -Force }
            gpg --batch --yes --pinentry-mode loopback --passphrase "$env:GPG_PASSPHRASE" --local-user "$env:GPG_FPR" --armor --detach-sign "$($_.FullName)"
          }

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/release-assets/*.jar
            dist/release-assets/*.jar.asc
            dist/release-assets/command_alias_lang_pack.zip
            dist/release-assets/command_alias_lang_pack.zip.asc
            dist/release-assets/command_alias_lang_pack.zip.sha1
            dist/release-assets/command_alias_lang_pack.zip.sha1.asc
